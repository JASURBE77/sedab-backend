<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(30, 41, 59, 0.95);
            padding: 1rem 2rem;
            border-bottom: 2px solid #22c55e;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            color: #22c55e;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #334155;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: #94a3b8;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #22c55e;
            border-bottom-color #22c55e;
        }

        .tab-btn:hover {
            color: #e2e8f0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === ORDERS TABLE === */
        .table-wrapper {
            overflow-x: auto;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(34, 197, 94, 0.1);
            border-bottom: 2px solid #22c55e;
        }

        th {
            padding: 1rem;
            text-align: left;
            color: #22c55e;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #475569;
            color: #cbd5e1;
        }

        tbody tr:hover {
            background: rgba(34, 197, 94, 0.05);
        }

        .order-id {
            color: #22c55e;
            font-weight: bold;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            min-width: 100px;
        }

        .status-new {
            background: #ef4444;
            color: white;
        }

        .status-delivery {
            background: #f59e0b;
            color: white;
        }

        .status-delivered {
            background: #22c55e;
            color: white;
        }

        .status-cancelled {
            background: #6b7280;
            color: white;
        }

        /* === FOOD GRID === */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.3s ease-in;
        }

        .food-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .food-card:hover {
            transform: translateY(-5px);
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        .food-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        .food-info {
            padding: 1.5rem;
        }

        .food-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }

        .food-category {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .food-description {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .food-ingredients {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .ingredient-tag {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .food-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }

        .food-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #22c55e;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #22c55e;
            color: white;
        }

        .btn-primary:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #22c55e;
            font-size: 1.1rem;
        }

        .error {
            background: #7f1d1d;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
        }

        .search-box::placeholder {
            color: #64748b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .food-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1rem;
            }

            .table-wrapper {
                padding: 1rem;
            }

            th, td {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .navbar h1 {
                font-size: 1.4rem;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }

        /* === LOGIN MODAL === */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-modal {
            background: rgba(30, 41, 59, 0.95);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
        }

        .login-title {
            color: #22c55e;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #16a34a;
            transform: scale(1.02);
        }

        /* === ADD FOOD MODAL === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: rgba(30, 41, 59, 0.95);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
        }

        .modal-title {
            color: #22c55e;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-modal">
            <h2 class="login-title">🍽️ Restaurant Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard (hidden initially) -->
    <div id="dashboard" style="display: none;">
        <!-- Navbar -->
        <div class="navbar">
            <h1>🍽️ Restaurant Management System</h1>
        </div>

        <!-- Main Container -->
        <div class="container">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('orders')">📋 Orders</button>
                <button class="tab-btn" onclick="switchTab('foods')">🍕 Foods</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 Statistics</button>
            </div>

        <!-- === ORDERS TAB === -->
        <div id="orders" class="tab-content active">
            <div class="controls">
                <input type="text" id="orderSearch" class="search-box" placeholder="🔍 Search by Order ID or Customer Name...">
                <button class="btn btn-secondary" onclick="loadOrders()">🔄 Refresh</button>
            </div>
            <div class="table-wrapper">
                <div id="ordersLoading" class="loading" style="display: none;">Loading orders...</div>
                <div id="ordersError" class="error" style="display: none;"></div>
                <table id="ordersTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Customer Name</th>
                            <th>Location</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
                <div id="ordersEmpty" class="empty-state" style="display: none;">
                    <div class="empty-state-icon">📭</div>
                    <p>No orders found</p>
                </div>
            </div>
        </div>

        <!-- === FOODS TAB === -->
        <div id="foods" class="tab-content">
            <div class="controls">
                <input type="text" id="foodSearch" class="search-box" placeholder="🔍 Search by food name...">
                <button class="btn btn-secondary" onclick="loadFoods()">🔄 Refresh</button>
                <button class="btn btn-primary" onclick="openAddFoodModal()">➕ Add Food</button>
            </div>
            <div id="foodsLoading" class="loading" style="display: none;">Loading foods...</div>
            <div id="foodsError" class="error" style="display: none;"></div>
            <div class="food-grid" id="foodsGrid"></div>
            <div id="foodsEmpty" class="empty-state" style="display: none;">
                <div class="empty-state-icon">🚫</div>
                <p>No foods found</p>
            </div>
        </div>

        <!-- === STATISTICS TAB === -->
        <div id="stats" class="tab-content">
            <div style="background: rgba(30, 41, 59, 0.8); padding: 2rem; border-radius: 12px; border: 1px solid #334155;">
                <h2 style="color: #22c55e; margin-bottom: 1.5rem;">📊 Statistics</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">Total Orders</div>
                        <div id="totalOrders" style="font-size: 2.5rem; color: #22c55e; font-weight: bold;">0</div>
                    </div>
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">Total Foods</div>
                        <div id="totalFoods" style="font-size: 2.5rem; color: #22c55e; font-weight: bold;">0</div>
                    </div>
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">New Orders</div>
                        <div id="newOrders" style="font-size: 2.5rem; color: #f59e0b; font-weight: bold;">0</div>
                    </div>
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">On Delivery</div>
                        <div id="onDeliveryOrders" style="font-size: 2.5rem; color: #f59e0b; font-weight: bold;">0</div>
                    </div>
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">Delivered</div>
                        <div id="deliveredOrders" style="font-size: 2.5rem; color: #22c55e; font-weight: bold;">0</div>
                    </div>
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #22c55e;">
                        <div style="color: #94a3b8; font-size: 0.9rem;">Avg Order Value</div>
                        <div id="avgOrderValue" style="font-size: 2.5rem; color: #22c55e; font-weight: bold;">$0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Food Modal -->
    <div id="addFoodModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <button class="modal-close" onclick="closeAddFoodModal()">×</button>
            <h2 class="modal-title">➕ Add New Food</h2>
            <form id="addFoodForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="foodName">Food Name *</label>
                        <input type="text" id="foodName" class="form-input" placeholder="Enter food name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="foodPrice">Price *</label>
                        <input type="number" id="foodPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="foodCategory">Category *</label>
                    <select id="foodCategory" class="form-input" required>
                        <option value="">Select a category</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="foodImage">Image URL</label>
                    <input type="url" id="foodImage" class="form-input" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label class="form-label" for="foodDescription">Description</label>
                    <textarea id="foodDescription" class="form-textarea" placeholder="Enter food description"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="foodIngredients">Ingredients (comma-separated)</label>
                    <input type="text" id="foodIngredients" class="form-input" placeholder="Tomato, Cheese, Basil">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Add Food</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api';

        // === LOGIN HANDLING ===
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple demo login (any username/password works)
            if (username && password) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadOrders(); // Load initial data
            } else {
                alert('Please enter username and password');
            }
        });

        // === TAB SWITCHING ===
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Load data if needed
            if (tabName === 'orders') {
                loadOrders();
            } else if (tabName === 'foods') {
                loadFoods();
            } else if (tabName === 'stats') {
                loadStats();
            }
        }

        // === LOAD ORDERS ===
        async function loadOrders() {
            const loader = document.getElementById('ordersLoading');
            const table = document.getElementById('ordersTable');
            const tbody = document.getElementById('ordersBody');
            const error = document.getElementById('ordersError');
            const empty = document.getElementById('ordersEmpty');

            loader.style.display = 'block';
            error.style.display = 'none';
            table.style.display = 'none';
            empty.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/orders`);
                const result = await response.json();

                if (result.success && result.data) {
                    tbody.innerHTML = '';
                    result.data.forEach(order => {
                        const statusClass = `status-${order.status.toLowerCase().replace(/\s+/g, '-')}`;
                        tbody.innerHTML += `
                            <tr>
                                <td class="order-id">${order.orderId}</td>
                                <td>${order.date}</td>
                                <td>${order.customerName}</td>
                                <td>${order.location}</td>
                                <td>${order.amount}</td>
                                <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                            </tr>
                        `;
                    });
                    table.style.display = 'table';
                } else {
                    empty.style.display = 'block';
                }
            } catch (err) {
                error.style.display = 'block';
                error.innerHTML = `❌ Error loading orders: ${err.message}`;
            }

            loader.style.display = 'none';
        }

        // === LOAD FOODS ===
        async function loadFoods() {
            const loader = document.getElementById('foodsLoading');
            const grid = document.getElementById('foodsGrid');
            const error = document.getElementById('foodsError');
            const empty = document.getElementById('foodsEmpty');

            loader.style.display = 'block';
            error.style.display = 'none';
            grid.innerHTML = '';
            empty.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/food`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    result.data.forEach(food => {
                        const ingredientsList = food.ingredients
                            .map(ing => `<span class="ingredient-tag">${ing}</span>`)
                            .join('');

                        grid.innerHTML += `
                            <div class="food-card">
                                <img src="${food.image || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzMzNDE1NSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE4IiBmaWxsPSIjOTRhM2I4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4='}" alt="${food.name}" class="food-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzMzNDE1NSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE4IiBmaWxsPSIjOTRhM2I4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5ObyBJbWFnZTwvdGV4dD48L3N2Zz4='">
                                <div class="food-info">
                                    <div class="food-name">${food.name}</div>
                                    <div class="food-category">${food.category.name}</div>
                                    <div class="food-description">${food.description}</div>
                                    <div class="food-ingredients">${ingredientsList}</div>
                                    <div class="food-footer">
                                        <span class="food-price">${food.price} so'm</span>
                                        <button class="btn btn-primary" onclick="addToCart('${food._id}', '${food.name}')">Add</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    empty.style.display = 'block';
                }
            } catch (err) {
                error.style.display = 'block';
                error.innerHTML = `❌ Error loading foods: ${err.message}`;
            }

            loader.style.display = 'none';
        }

        // === LOAD STATISTICS ===
        async function loadStats() {
            try {
                const ordersRes = await fetch(`${API_BASE}/orders`);
                const ordersData = await ordersRes.json();
                const foodsRes = await fetch(`${API_BASE}/food`);
                const foodsData = await foodsRes.json();

                if (ordersData.success && foodsData.success) {
                    const orders = ordersData.data || [];
                    const foods = foodsData.data || [];

                    const newOrders = orders.filter(o => o.status === 'New Order').length;
                    const onDelivery = orders.filter(o => o.status === 'On Delivery').length;
                    const delivered = orders.filter(o => o.status === 'Delivered').length;
                    const avgValue = orders.length > 0 
                        ? (orders.reduce((sum, o) => sum + parseFloat(o.amount.replace('$', '')), 0) / orders.length).toFixed(2)
                        : 0;

                    document.getElementById('totalOrders').textContent = orders.length;
                    document.getElementById('totalFoods').textContent = foods.length;
                    document.getElementById('newOrders').textContent = newOrders;
                    document.getElementById('onDeliveryOrders').textContent = onDelivery;
                    document.getElementById('deliveredOrders').textContent = delivered;
                    document.getElementById('avgOrderValue').textContent = `$${avgValue}`;
                }
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        // === ADD FOOD MODAL ===
        function openAddFoodModal() {
            document.getElementById('addFoodModal').style.display = 'flex';
            loadCategoriesForForm();
        }

        function closeAddFoodModal() {
            document.getElementById('addFoodModal').style.display = 'none';
            document.getElementById('addFoodForm').reset();
        }

        // Load categories for the form
        async function loadCategoriesForForm() {
            try {
                const response = await fetch(`${API_BASE}/categories`);
                const result = await response.json();
                
                const select = document.getElementById('foodCategory');
                select.innerHTML = '<option value="">Select a category</option>';
                
                if (result.success && result.data) {
                    result.data.forEach(category => {
                        select.innerHTML += `<option value="${category._id}">${category.name}</option>`;
                    });
                }
            } catch (err) {
                console.error('Error loading categories:', err);
            }
        }

        // Handle add food form submission
        document.getElementById('addFoodForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('foodName').value,
                price: document.getElementById('foodPrice').value,
                category: document.getElementById('foodCategory').value,
                imageUrl: document.getElementById('foodImage').value,
                description: document.getElementById('foodDescription').value,
                ingredients: document.getElementById('foodIngredients').value
            };

            try {
                const response = await fetch(`${API_BASE}/food`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    alert('Food added successfully!');
                    closeAddFoodModal();
                    loadFoods(); // Refresh the foods list
                } else {
                    alert('Error adding food: ' + result.msg);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        // === INITIAL LOAD ===
        // Removed DOMContentLoaded listener since login is shown first

        // === SEARCH FILTERS ===
        document.addEventListener('DOMContentLoaded', () => {
            const orderSearch = document.getElementById('orderSearch');
            if (orderSearch) {
                orderSearch.addEventListener('keyup', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    document.querySelectorAll('#ordersTable tbody tr').forEach(row => {
                        const text = row.innerText.toLowerCase();
                        row.style.display = text.includes(searchTerm) ? '' : 'none';
                    });
                });
            }

            const foodSearch = document.getElementById('foodSearch');
            if (foodSearch) {
                foodSearch.addEventListener('keyup', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    document.querySelectorAll('.food-card').forEach(card => {
                        const name = card.querySelector('.food-name').innerText.toLowerCase();
                        card.style.display = name.includes(searchTerm) ? '' : 'none';
                    });
                });
            }
        });
    </script>
</body>
</html>

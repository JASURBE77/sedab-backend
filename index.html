<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container { padding: 20px; }

.card {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.primary { background: #22c55e; color: white; }

input {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    width: 200px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.food {
    width: 180px;
}

img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🟢 FIRST ADMIN SETUP -->
<div id="setupBox">
    <h2>🟢 First Admin Setup</h2>

    <input id="sname" placeholder="Name">
    <input id="ssurname" placeholder="Surname">
    <input id="slogin" placeholder="Login">
    <input id="spass" type="password" placeholder="Password">

    <button class="primary" onclick="setupAdmin()">Create Admin</button>
</div>

<hr>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>

    <input id="login" placeholder="login">
    <input id="password" type="password" placeholder="password">

    <button class="primary" onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div id="cashierBox" style="display:none;">
    <h2>🍔 Cashier</h2>

    <div id="foods" class="grid"></div>

    <h3>Categories</h3>
    <div id="categoriesEl" class="grid"></div>

    <h3>🛒 Cart</h3>
    <div id="cart"></div>
    <h3 id="totalPriceLabel">Total: 0 so'm</h3>

    <button class="primary" onclick="sendOrder()">Send Order</button>

    <h3>Order Status</h3>
    <div id="cashierOrders"></div>
</div>

<!-- CHEF -->
<div id="chefBox" style="display:none;">
    <h2>👨‍🍳 Chef</h2>
    <div id="orders"></div>
</div>

<!-- ADMIN -->
<div id="adminBox" style="display:none;">
    <h2>👑 Admin</h2>

    <button onclick="loadStats()">Refresh Stats</button>

    <pre id="stats"></pre>

    <h3>Create Category</h3>
    <input id="catName" placeholder="Category Name">
    <button onclick="createCategory()">Create Category</button>

    <h3>Create Food</h3>
    <input id="foodName" placeholder="Food Name">
    <input id="foodPrice" type="number" placeholder="Price">
    <select id="foodCategory"></select>
    <input id="foodImage" type="file">
    <button onclick="createFood()">Create Food</button>

    <h3>Create Chef</h3>
    <input id="chefName" placeholder="Name">
    <input id="chefSurname" placeholder="Surname">
    <input id="chefPhone" placeholder="Phone">
    <input id="chefAge" type="number" placeholder="Age">
    <input id="chefSalary" type="number" placeholder="Salary">
    <input id="chefLogin" placeholder="Login">
    <input id="chefPass" type="password" placeholder="Password">
    <button onclick="createChef()">Create Chef</button>

    <h3>Staff Information</h3>
    <button onclick="loadStaff()">Load Staff</button>
    <div id="staffInfo"></div>

    <h3>Orders</h3>
    <button onclick="loadAdminOrders()">Load Orders</button>
    <div id="adminOrders"></div>
</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
const API = "http://localhost:6000/api";
const socket = io("http://localhost:6000", {
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    reconnectionAttempts: 5
});

const setupBox = document.getElementById("setupBox");
const loginBox = document.getElementById("loginBox");
const cashierBox = document.getElementById("cashierBox");
const chefBox = document.getElementById("chefBox");
const adminBox = document.getElementById("adminBox");
const foodsEl = document.getElementById("foods");
const cartBox = document.getElementById("cart");
const ordersEl = document.getElementById("orders");
const statsEl = document.getElementById("stats");
const cashierOrdersEl = document.getElementById("cashierOrders");
const foodCategory = document.getElementById("foodCategory");
const catName = document.getElementById("catName");
const foodName = document.getElementById("foodName");
const foodPrice = document.getElementById("foodPrice");
const foodImage = document.getElementById("foodImage");
const cashName = document.getElementById("cashName");
const cashSurname = document.getElementById("cashSurname");
const cashPhone = document.getElementById("cashPhone");
const cashAge = document.getElementById("cashAge");
const cashSalary = document.getElementById("cashSalary");
const cashLogin = document.getElementById("cashLogin");
const cashPass = document.getElementById("cashPass");
const chefName = document.getElementById("chefName");
const chefSurname = document.getElementById("chefSurname");
const chefPhone = document.getElementById("chefPhone");
const chefAge = document.getElementById("chefAge");
const chefSalary = document.getElementById("chefSalary");
const chefLogin = document.getElementById("chefLogin");
const chefPass = document.getElementById("chefPass");
const loginInput = document.getElementById("login");
const passwordInput = document.getElementById("password");
const sname = document.getElementById("sname");
const ssurname = document.getElementById("ssurname");
const slogin = document.getElementById("slogin");
const spass = document.getElementById("spass");
const categoriesEl = document.getElementById("categoriesEl");
const totalPriceLabel = document.getElementById("totalPriceLabel");
const sname = document.getElementById("sname");
const ssurname = document.getElementById("ssurname");
const slogin = document.getElementById("slogin");
const loginInput = document.getElementById("login");
const passwordInput = document.getElementById("password");
const adminOrdersEl = document.getElementById("adminOrders");

let token = "";
let role = "";
let cart = [];

/* ---------------- FIRST ADMIN SETUP ---------------- */
async function setupAdmin() {
    const res = await fetch(API + "/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name: sname.value,
            surname: ssurname.value,
            login: slogin.value,
            password: spass.value
        })
    });

    const data = await res.json();
    alert(data.msg || "Done");

    if (res.ok) {
        setupBox.style.display = "none";
    }
}

/* ---------------- LOGIN ---------------- */
async function login() {
    const res = await fetch(API + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            login: loginInput.value,
            password: passwordInput.value
        })
    });

    const data = await res.json();

    if (!data.token) {
        alert("Login error");
        return;
    }

    token = data.token;
    role = data.role;

    loginBox.style.display = "none";

    if (role === "chef") {
        socket.emit("join-chef");
        chefBox.style.display = "block";
        loadOrders();
        
        // Listen for new-order events
        socket.on("new-order", (data) => {
            console.log("New order notification:", data);
            alert(data.msg);
            loadOrders();
        });
    }

    if (role === "admin") {
        adminBox.style.display = "block";
        loadStats();
        loadCategories();
    }
}

/* ---------------- FOODS ---------------- */
async function loadFoods() {
    const res = await fetch(API + "/foods", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }

    const data = response.data || [];

    // Group foods by category
    const grouped = {};
    data.forEach(f => {
        const catId = f.category._id;
        const catName = f.category.name;
        if (!grouped[catId]) grouped[catId] = { name: catName, foods: [] };
        grouped[catId].foods.push(f);
    });
    
    categoriesEl.innerHTML = Object.entries(grouped).map(([catId, cat]) => `
        <div class="card">
            <h4>${cat.name}</h4>
            ${cat.foods.map(f => `
                <div style="margin:5px; padding:5px; background:#0f172a; border-radius:5px;">
                    <p style="margin:0;">${f.name} - ${f.price} so'm</p>
                    <button class="primary" style="padding:5px; font-size:12px;" onclick="addCart('${f._id}','${f.name}',${f.price})">Add</button>
                </div>
            `).join('')}
        </div>
    `).join("");
}

/* ---------------- CART ---------------- */
function addCart(id, name, price) {
    let item = cart.find(i => i.foodId === id);

    if (item) item.quantity++;
    else cart.push({ foodId: id, quantity: 1, name, price });

    renderCart();
}

function renderCart() {
    cartBox.innerHTML = cart
        .map(i => `<div>${i.name} x ${i.quantity} = ${i.price * i.quantity} so'm</div>`)
        .join("");
    
    const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    totalPriceLabel.innerText = `Total: ${total} so'm`;
}

/* ---------------- ORDER ---------------- */
async function sendOrder() {
    const res = await fetch(API + "/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            foods: cart.map(i => ({
                foodId: i.foodId,
                quantity: i.quantity
            }))
        })
    });

    const response = await res.json();
    alert(response.msg);
    
    if (response.success) {
        cart = [];
        renderCart();
        loadCashierOrders();
    }
}

/* ---------------- CASHIER ORDERS ---------------- */
async function loadCashierOrders() {
    const res = await fetch(API + "/orders/cashier", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        console.error("Error: " + response.msg);
        return;
    }

    const data = response.data || [];

    cashierOrdersEl.innerHTML = data.map(o => `
        <div class="card">
            <h4>Order #${o.orderNumber}</h4>
            <p>Status: ${o.status}</p>
            <p>Foods: ${o.foods.map(f => `${f.foodId.name} x ${f.quantity}`).join(', ')}</p>
        </div>
    `).join("");
}

/* ---------------- CHEF ---------------- */
async function loadOrders() {
    const res = await fetch(API + "/orders", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }

    const data = response.data || [];

    ordersEl.innerHTML = data.map(o => `
        <div class="card">
            <h3>Order #${o.orderNumber}</h3>
            <p>Status: ${o.status}</p>
            <p>Foods: ${o.foods.map(f => `${f.foodId.name} x ${f.quantity}`).join(', ')}</p>
            <button class="primary" onclick="ready('${o._id}')">Ready</button>
        </div>
    `).join("");
}

async function ready(id) {
    const res = await fetch(API + "/orders/" + id + "/ready", {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    alert(response.msg);
    
    if (response.success) {
        loadOrders();
    }
}

/* ---------------- ADMIN ---------------- */
async function loadStats() {
    const res = await fetch(API + "/admin/stats", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }

    statsEl.innerText = JSON.stringify(response.data, null, 2);
}

async function loadCategories() {
    const res = await fetch(API + "/categories", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }
    
    const data = response.data || [];
    foodCategory.innerHTML = data.map(c => `<option value="${c._id}">${c.name}</option>`).join("");
}

async function createCategory() {
    const res = await fetch(API + "/categories", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ name: catName.value })
    });

    const response = await res.json();
    alert(response.msg);
    
    if (response.success) {
        catName.value = '';
        loadCategories();
    }
}

async function createFood() {
    const formData = new FormData();
    formData.append("name", foodName.value);
    formData.append("price", foodPrice.value);
    formData.append("category", foodCategory.value);
    formData.append("image", foodImage.files[0]);

    const res = await fetch(API + "/foods", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
        body: formData
    });

    const response = await res.json();
    alert(response.msg);
    
    if (response.success) {
        foodName.value = '';
        foodPrice.value = '';
        foodImage.value = '';
    }
}

async function createChef() {
    const res = await fetch(API + "/admin/chef", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({
            name: chefName.value,
            surname: chefSurname.value,
            phone: chefPhone.value,
            age: parseInt(chefAge.value),
            salary: parseInt(chefSalary.value),
            login: chefLogin.value,
            password: chefPass.value
        })
    });

    const response = await res.json();
    alert(response.msg);
    
    if (response.success) {
        chefName.value = '';
        chefSurname.value = '';
        chefPhone.value = '';
        chefAge.value = '';
        chefSalary.value = '';
        chefLogin.value = '';
        chefPass.value = '';
    }
}

async function loadStaff() {
    const res = await fetch(API + "/admin/staff", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }

    const staffData = response.data || { chefs: [], totalChefs: 0 };

    staffInfoEl.innerHTML = `
        <h4>Chefs: ${staffData.totalChefs}</h4>
        <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#1e293b;">
                <th style="border:1px solid #444; padding:8px;">Name</th>
                <th style="border:1px solid #444; padding:8px;">Phone</th>
                <th style="border:1px solid #444; padding:8px;">Age</th>
                <th style="border:1px solid #444; padding:8px;">Salary</th>
            </tr>
            ${staffData.chefs.map(c => `
                <tr>
                    <td style="border:1px solid #444; padding:8px;">${c.name} ${c.surname || ''}</td>
                    <td style="border:1px solid #444; padding:8px;">${c.phone || '-'}</td>
                    <td style="border:1px solid #444; padding:8px;">${c.age || '-'}</td>
                    <td style="border:1px solid #444; padding:8px;">${c.salary || '-'} so'm</td>
                </tr>
            `).join('')}
        </table>
    `;
}

async function loadAdminOrders() {
    const res = await fetch(API + "/orders/admin", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const response = await res.json();
    
    if (!response.success) {
        alert("Error: " + response.msg);
        return;
    }

    const orders = response.data || [];
    adminOrdersEl.innerHTML = orders.map(order => `
        <div style="border:1px solid #444; padding:10px; margin:10px 0;">
            <h4>Order #${order.orderNumber} - ${order.customerName} - ${order.status} - ${order.totalPrice} so'm</h4>
            <p>Created: ${new Date(order.createdAt).toLocaleString()}</p>
            <ul>
                ${order.foods.map(f => `<li>${f.quantity}x ${f.foodId.name} (${f.foodId.category.name})</li>`).join('')}
            </ul>
        </div>
    `).join('');
}
</script>

</body>
</html>

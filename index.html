<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container { padding: 20px; }

.card {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.primary { background: #22c55e; color: white; }

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    width: 200px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.food {
    width: 180px;
}

img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ADMIN SETUP -->
<div id="setupBox">
    <h2>🟢 First Admin Setup</h2>

    <input id="sname" placeholder="Name">
    <input id="ssurname" placeholder="Surname">
    <input id="slogin" placeholder="Login">
    <input id="spass" type="password" placeholder="Password">

    <button class="primary" onclick="setupAdmin()">Create Admin</button>
</div>

<hr>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>

    <input id="login" placeholder="login">
    <input id="password" type="password" placeholder="password">

    <button class="primary" onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div id="cashierBox" style="display:none;">
    <h2>🍔 Cashier</h2>

    <div id="categoriesEl" class="grid"></div>

    <h3>🛒 Cart</h3>
    <div id="cart"></div>
    <h3 id="totalPriceLabel">Total: 0 so'm</h3>

    <button class="primary" onclick="sendOrder()">Send Order</button>

    <h3>Orders</h3>
    <div id="cashierOrders"></div>
</div>

<!-- CHEF -->
<div id="chefBox" style="display:none;">
    <h2>👨‍🍳 Chef</h2>
    <div id="orders"></div>
</div>

<!-- ADMIN -->
<div id="adminBox" style="display:none;">
    <h2>👑 Admin</h2>

    <button onclick="loadStats()">Refresh Stats</button>
    <pre id="stats"></pre>

    <h3>Create Category</h3>
    <input id="catName" placeholder="Category Name">
    <button onclick="createCategory()">Create</button>

    <h3>Create Food</h3>
    <input id="foodName" placeholder="Food Name">
    <input id="foodPrice" type="number" placeholder="Price">
    <select id="foodCategory"></select>
    <input id="foodImage" type="file">
    <button onclick="createFood()">Create</button>

    <h3>Create Chef</h3>
    <input id="chefName" placeholder="Name">
    <input id="chefSurname" placeholder="Surname">
    <input id="chefPhone" placeholder="Phone">
    <input id="chefAge" type="number" placeholder="Age">
    <input id="chefSalary" type="number" placeholder="Salary">
    <input id="chefLogin" placeholder="Login">
    <input id="chefPass" type="password" placeholder="Password">
    <button onclick="createChef()">Create Chef</button>

    <h3>Staff</h3>
    <button onclick="loadStaff()">Load Staff</button>
    <div id="staffInfo"></div>

    <h3>Orders</h3>
    <button onclick="loadAdminOrders()">Load Orders</button>
    <div id="adminOrders"></div>
</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>

const API = "https://sedab-backend.onrender.com/api";

// 🔥 FIXED SOCKET (production)
const socket = io("https://sedab-backend.onrender.com");

const setupBox = document.getElementById("setupBox");
const loginBox = document.getElementById("loginBox");
const cashierBox = document.getElementById("cashierBox");
const chefBox = document.getElementById("chefBox");
const adminBox = document.getElementById("adminBox");

const categoriesEl = document.getElementById("categoriesEl");
const cartEl = document.getElementById("cart");
const totalPriceLabel = document.getElementById("totalPriceLabel");

const foodCategory = document.getElementById("foodCategory");

const catName = document.getElementById("catName");
const foodName = document.getElementById("foodName");
const foodPrice = document.getElementById("foodPrice");
const foodImage = document.getElementById("foodImage");

const chefName = document.getElementById("chefName");
const chefSurname = document.getElementById("chefSurname");
const chefPhone = document.getElementById("chefPhone");
const chefAge = document.getElementById("chefAge");
const chefSalary = document.getElementById("chefSalary");
const chefLogin = document.getElementById("chefLogin");
const chefPass = document.getElementById("chefPass");

const loginInput = document.getElementById("login");
const passwordInput = document.getElementById("password");

const sname = document.getElementById("sname");
const ssurname = document.getElementById("ssurname");
const slogin = document.getElementById("slogin");
const spass = document.getElementById("spass");

const statsEl = document.getElementById("stats");
const staffInfoEl = document.getElementById("staffInfo");
const cashierOrdersEl = document.getElementById("cashierOrders");
const ordersEl = document.getElementById("orders");
const adminOrdersEl = document.getElementById("adminOrders");

let token = "";
let role = "";
let cart = [];

/* ---------------- ADMIN SETUP ---------------- */
async function setupAdmin() {
    const res = await fetch(API + "/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name: sname.value,
            surname: ssurname.value,
            login: slogin.value,
            password: spass.value
        })
    });

    const data = await res.json();
    alert(data.msg);

    if (res.ok) setupBox.style.display = "none";
}

/* ---------------- LOGIN ---------------- */
async function login() {
    const res = await fetch(API + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            login: loginInput.value,
            password: passwordInput.value
        })
    });

    const data = await res.json();

    if (!data.token) return alert("Login error");

    token = data.token;
    role = data.role;

    loginBox.style.display = "none";

    if (role === "cashier") {
        cashierBox.style.display = "block";
        loadFoods();
        loadCashierOrders();
    }

    if (role === "chef") {
        chefBox.style.display = "block";
        loadOrders();
    }

    if (role === "admin") {
        adminBox.style.display = "block";
        loadStats();
        loadCategories();
    }
}

/* ---------------- FOODS ---------------- */
async function loadFoods() {
    const res = await fetch(API + "/foods", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    const foods = data.data || [];

    const grouped = {};
    foods.forEach(f => {
        const id = f.category._id;
        if (!grouped[id]) grouped[id] = { name: f.category.name, foods: [] };
        grouped[id].foods.push(f);
    });

    categoriesEl.innerHTML = Object.entries(grouped).map(([id, cat]) => `
        <div class="card">
            <h4>${cat.name}</h4>
            ${cat.foods.map(f => `
                <div>
                    ${f.name} - ${f.price}
                    <button class="primary" onclick="addCart('${f._id}','${f.name}',${f.price})">Add</button>
                </div>
            `).join('')}
        </div>
    `).join('');
}

/* ---------------- CART ---------------- */
function addCart(id, name, price) {
    let item = cart.find(i => i.foodId === id);
    if (item) item.quantity++;
    else cart.push({ foodId: id, name, price, quantity: 1 });
    renderCart();
}

function renderCart() {
    cartEl.innerHTML = cart.map(i =>
        `<div>${i.name} x ${i.quantity} = ${i.price * i.quantity}</div>`
    ).join("");

    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    totalPriceLabel.innerText = "Total: " + total + " so'm";
}

/* ---------------- ORDER ---------------- */
async function sendOrder() {
    const res = await fetch(API + "/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            foods: cart.map(i => ({
                foodId: i.foodId,
                quantity: i.quantity
            }))
        })
    });

    const data = await res.json();
    alert(data.msg);

    if (data.success) {
        cart = [];
        renderCart();
        loadCashierOrders();
    }
}

/* ---------------- CHEF ---------------- */
async function loadOrders() {
    const res = await fetch(API + "/orders", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    const orders = data.data || [];

    ordersEl.innerHTML = orders.map(o => `
        <div class="card">
            <h3>#${o.orderNumber}</h3>
            <p>${o.status}</p>
            <button class="primary" onclick="ready('${o._id}')">Ready</button>
        </div>
    `).join('');
}

async function ready(id) {
    await fetch(API + "/orders/" + id + "/ready", {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` }
    });

    loadOrders();
}

/* ---------------- ADMIN ---------------- */
async function loadStats() {
    const res = await fetch(API + "/admin/stats", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();
    statsEl.innerText = JSON.stringify(data.data, null, 2);
}

async function loadCategories() {
    const res = await fetch(API + "/categories", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    foodCategory.innerHTML = data.data.map(c =>
        `<option value="${c._id}">${c.name}</option>`
    ).join('');
}

async function createCategory() {
    await fetch(API + "/categories", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name: catName.value })
    });

    loadCategories();
}

async function createFood() {
    const fd = new FormData();
    fd.append("name", foodName.value);
    fd.append("price", foodPrice.value);
    fd.append("category", foodCategory.value);
    fd.append("image", foodImage.files[0]);

    await fetch(API + "/foods", {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
        body: fd
    });

    alert("Food created");
}

async function createChef() {
    await fetch(API + "/admin/chef", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            name: chefName.value,
            surname: chefSurname.value,
            phone: chefPhone.value,
            age: chefAge.value,
            salary: chefSalary.value,
            login: chefLogin.value,
            password: chefPass.value
        })
    });

    alert("Chef created");
}

async function loadStaff() {
    const res = await fetch(API + "/admin/staff", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    const chefs = data.data.chefs;

    staffInfoEl.innerHTML = chefs.map(c =>
        `<div>${c.name} ${c.surname} - ${c.phone}</div>`
    ).join('');
}

async function loadCashierOrders() {
    const res = await fetch(API + "/orders/cashier", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    cashierOrdersEl.innerHTML = data.data.map(o =>
        `<div class="card">#${o.orderNumber} - ${o.status}</div>`
    ).join('');
}

async function loadAdminOrders() {
    const res = await fetch(API + "/orders/admin", {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    adminOrdersEl.innerHTML = data.data.map(o =>
        `<div class="card">#${o.orderNumber} - ${o.status}</div>`
    ).join('');
}

</script>
</body>
</html>
